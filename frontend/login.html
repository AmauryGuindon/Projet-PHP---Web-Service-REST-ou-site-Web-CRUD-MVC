<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — BetZone</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav>
    <a class="nav-brand" href="index.html"><div class="logo-icon">⚡</div>BetZone</a>
    <div class="nav-links" id="nav-links">
        <a href="matches.html">Matchs</a>
        <span class="nav-spacer"></span>
        <a href="login.html" class="btn btn-primary btn-sm active">Connexion</a>
    </div>
    <button class="nav-toggle" id="nav-toggle">☰</button>
</nav>

<main style="max-width:440px">
    <div style="text-align:center;margin-bottom:2rem">
        <div style="font-size:2.5rem;margin-bottom:.5rem">⚡</div>
        <h1 style="font-size:1.5rem;font-weight:800">Bienvenue sur BetZone</h1>
        <p style="color:var(--text-muted);margin-top:.35rem;font-size:.9rem">Connectez-vous pour accéder à vos paris</p>
    </div>

    <div class="card" style="padding:1.75rem">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('login',this)">Se connecter</button>
            <button class="tab-btn" onclick="showTab('register',this)">Créer un compte</button>
        </div>

        <div id="tab-login">
            <div id="login-alert" style="display:none" class="alert"></div>
            <form onsubmit="doLogin(event)">
                <div class="form-group"><label>Email</label><input type="email" id="login-email" required placeholder="jean@example.com" autocomplete="email"></div>
                <div class="form-group"><label>Mot de passe</label><input type="password" id="login-password" required autocomplete="current-password"></div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Se connecter</button>
            </form>
        </div>

        <div id="tab-register" style="display:none">
            <div id="register-alert" style="display:none" class="alert"></div>
            <form onsubmit="doRegister(event)">
                <div class="form-group"><label>Nom</label><input type="text" id="reg-name" required placeholder="Jean Dupont"></div>
                <div class="form-group"><label>Email</label><input type="email" id="reg-email" required placeholder="jean@example.com"></div>
                <div class="form-group"><label>Mot de passe</label><input type="password" id="reg-password" required minlength="8" placeholder="8 caractères minimum"></div>
                <div class="form-group"><label>Confirmation</label><input type="password" id="reg-confirm" required placeholder="Répétez le mot de passe"></div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Créer le compte</button>
            </form>
        </div>
    </div>
</main>

<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
    if (Api.isLoggedIn()) window.location.href = 'index.html';

    function showTab(tab, btn) {
        document.getElementById('tab-login').style.display = tab==='login' ? '' : 'none';
        document.getElementById('tab-register').style.display = tab==='register' ? '' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function doLogin(e) {
        e.preventDefault();
        const alertEl = document.getElementById('login-alert');
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true; btn.textContent = 'Connexion...';
        try {
            const res = await Api.post('/auth/login', { email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
            Api.setToken(res.token);
            const me = await Api.get('/me', true);
            Api.setUser(me);
            window.location.href = 'index.html';
        } catch(err) {
            alertEl.className = 'alert alert-danger';
            alertEl.textContent = err.data?.message || 'Identifiants incorrects.';
            alertEl.style.display = '';
            btn.disabled = false; btn.textContent = 'Se connecter';
        }
    }

    async function doRegister(e) {
        e.preventDefault();
        const alertEl = document.getElementById('register-alert');
        const pass = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;
        if (pass !== confirm) { alertEl.className='alert alert-danger'; alertEl.textContent='Les mots de passe ne correspondent pas.'; alertEl.style.display=''; return; }
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true; btn.textContent = 'Création...';
        try {
            const res = await Api.post('/auth/register', { name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password: pass, password_confirmation: confirm });
            Api.setToken(res.token);
            const me = await Api.get('/me', true);
            Api.setUser(me);
            window.location.href = 'index.html';
        } catch(err) {
            const errors = err.data?.errors;
            alertEl.className='alert alert-danger';
            alertEl.textContent = errors ? Object.values(errors).flat().join(' ') : (err.data?.message||'Erreur.');
            alertEl.style.display='';
            btn.disabled=false; btn.textContent='Créer le compte';
        }
    }
</script>
</body>
</html>
