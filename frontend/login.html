<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Paris Sportifs</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav>
    <a class="brand" href="index.html">⚽ Paris Sportifs</a>
    <a href="matches.html">Matchs</a>
    <span class="spacer"></span>
    <a href="login.html" class="active">Connexion</a>
</nav>

<main style="max-width:460px">
    <h1>Connexion</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('login', this)">Se connecter</button>
        <button class="tab-btn" onclick="showTab('register', this)">Créer un compte</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
        <div id="login-alert" style="display:none" class="alert"></div>
        <form onsubmit="doLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" required placeholder="jean@example.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Se connecter</button>
        </form>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
        <div id="register-alert" style="display:none" class="alert"></div>
        <form onsubmit="doRegister(event)">
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="reg-name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="reg-password" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirmation</label>
                <input type="password" id="reg-confirm" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Créer le compte</button>
        </form>
    </div>
</main>

<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
    if (Api.isLoggedIn()) window.location.href = 'index.html';

    function showTab(tab, btn) {
        document.getElementById('tab-login').style.display = tab === 'login' ? '' : 'none';
        document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function doLogin(e) {
        e.preventDefault();
        const alert = document.getElementById('login-alert');
        try {
            const res = await Api.post('/auth/login', {
                email:    document.getElementById('login-email').value,
                password: document.getElementById('login-password').value,
            });
            Api.setToken(res.token);
            const me = await Api.get('/me', true);
            Api.setUser(me);
            window.location.href = 'index.html';
        } catch (err) {
            alert.className = 'alert alert-danger';
            alert.textContent = err.data?.message || 'Identifiants incorrects.';
            alert.style.display = '';
        }
    }

    async function doRegister(e) {
        e.preventDefault();
        const alertEl = document.getElementById('register-alert');
        const pass    = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;
        if (pass !== confirm) {
            alertEl.className = 'alert alert-danger';
            alertEl.textContent = 'Les mots de passe ne correspondent pas.';
            alertEl.style.display = '';
            return;
        }
        try {
            const res = await Api.post('/auth/register', {
                name:                  document.getElementById('reg-name').value,
                email:                 document.getElementById('reg-email').value,
                password:              pass,
                password_confirmation: confirm,
            });
            Api.setToken(res.token);
            const me = await Api.get('/me', true);
            Api.setUser(me);
            window.location.href = 'index.html';
        } catch (err) {
            const errors = err.data?.errors;
            const msg = errors ? Object.values(errors).flat().join(' ') : (err.data?.message || 'Erreur lors de l\'inscription.');
            alertEl.className = 'alert alert-danger';
            alertEl.textContent = msg;
            alertEl.style.display = '';
        }
    }
</script>
</body>
</html>
