<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Paris — BetZone</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<nav>
    <a class="nav-brand" href="index.html"><div class="logo-icon">⚡</div>BetZone</a>
    <div class="nav-links" id="nav-links">
        <a href="matches.html">Matchs</a>
        <a href="my-bets.html" class="active" id="nav-bets" style="display:none">Mes Paris</a>
        <a id="nav-admin" href="admin.html" style="display:none">Admin</a>
        <span class="nav-spacer"></span>
        <div class="nav-user-pill" id="nav-user-pill" style="display:none"><div class="nav-user-avatar" id="nav-avatar">U</div><span id="nav-user"></span></div>
        <a id="nav-login" href="login.html" class="btn btn-ghost btn-sm">Connexion</a>
        <a href="#" id="nav-logout" style="display:none" class="btn btn-ghost btn-sm">Déconnexion</a>
    </div>
    <button class="nav-toggle" id="nav-toggle">☰</button>
</nav>

<main>
    <div class="page-header">
        <h1>Mes Paris</h1>
        <p>Suivez vos performances et gérez vos mises</p>
    </div>

    <div id="stats-bar" class="grid-4" style="margin-bottom:2rem"></div>

    <div class="filters">
        <select id="filter-status" onchange="loadBets()">
            <option value="">Tous les paris</option>
            <option value="pending">⏳ En attente</option>
            <option value="won">✅ Gagnés</option>
            <option value="lost">❌ Perdus</option>
            <option value="cancelled">🚫 Annulés</option>
        </select>
    </div>

    <div id="bets-container" class="loading"></div>
</main>

<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/bets.js"></script>
</body>
</html>
